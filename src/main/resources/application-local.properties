# Local profile — MySQL local, no overdue scheduler
# Run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

# DB local — hardcoded để luôn kết nối localhost, bất kể env var nào đang active (kể cả .env Railway)
spring.datasource.url=jdbc:mysql://localhost:3306/electricity_billing?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.repair-on-migrate=true

app.upload.dir=uploads-dev

# Suppress noisy AWS logs when credentials are not configured locally
logging.level.com.loc.electricity.infrastructure.aws=WARN
logging.level.software.amazon.awssdk=WARN

# Sepay
app.sepay.webhook-secret=API_KEY_CUA_BAN_TU_SEPAY
