spring.application.name=finpen-electricity

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/electricity_billing?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

# JPA — Flyway owns the schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — token valid for 8 hours (one full workday)
app.jwt.secret=${JWT_SECRET:ZmlucGVuLWVsZWN0cmljaXR5LWRldmVsb3BtZW50LXNlY3JldC1rZXktbXVzdC1iZS02NC1jaGFycy1sb25nISE=}
app.jwt.access-token-expiration-ms=28800000

# SePay webhook
app.sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET:dev-secret}

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# AWS SNS (SMS)
aws.region=${AWS_REGION:ap-southeast-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.sns.sms-type=${AWS_SNS_SMS_TYPE:Transactional}
